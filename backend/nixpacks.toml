[phases.setup]
# ffmpeg: required for librosa to decode m4a/aac/mp3 files
# libsndfile: required for soundfile Python package
nixPkgs = ["ffmpeg", "libsndfile", "python311"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt --no-cache-dir"
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 60"

