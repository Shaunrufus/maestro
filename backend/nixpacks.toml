# backend/nixpacks.toml — MAESTRO Production
# praat: required for psola (TD-PSOLA pitch shifting)
# libsndfile + ffmpeg: needed by librosa/soundfile/pydub for audio I/O

[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "praat",
  "libsndfile",
  "ffmpeg",
]

[phases.install]
cmds = [
  "python3.11 -m pip install --upgrade pip",
  "python3.11 -m pip install -r requirements.txt",
  # Download SoundFont for realistic instrument rendering
  "mkdir -p soundfonts",
  "python3.11 -c \"from app.services.download_soundfont import download_soundfont; download_soundfont()\"",
]

[start]
cmd = "python3.11 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT"
